<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Decision Engine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
h1{font-size:18px;font-weight:500}
input,select,button{font-family:inherit;font-size:13px}
input[type=text],input[type=number]{padding:5px 8px;border:0.5px solid #ccc;border-radius:6px;outline:none;background:#fff;color:#1a1a1a}
input[type=text]:focus,input[type=number]:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
input[type=number]{width:56px;text-align:center}
input[type=range]{width:110px;accent-color:#378ADD}
button{padding:6px 13px;border:0.5px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;color:#1a1a1a;transition:background .15s}
button:hover{background:#f0f0ee}
button:active{transform:scale(.98)}
button.icon{padding:2px 7px;font-size:16px;color:#888;border-color:transparent;background:none}
button.icon:hover{color:#c00;background:none}
button.danger{border-color:#f0b0b0;color:#c00}
button.danger:hover{background:#fff0f0}
button.small{padding:4px 10px;font-size:12px}
select{padding:5px 8px;border:0.5px solid #ccc;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer}
.mode-bar{display:flex;align-items:center;gap:0;margin-bottom:24px;border:0.5px solid #ddd;border-radius:8px;overflow:hidden;width:fit-content}
.mode-btn{padding:8px 22px;font-size:13px;font-weight:500;background:#fff;border:none;cursor:pointer;color:#888;transition:background .15s,color .15s}
.mode-btn:first-child{border-right:0.5px solid #ddd}
.mode-btn.active{background:#378ADD;color:#fff}
.mode-btn:hover:not(.active){background:#f0f0ee}
.wrap{max-width:940px;margin:0 auto;padding:20px 16px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.topbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tabs{display:flex;border-bottom:0.5px solid #ddd;margin-bottom:20px;gap:0}
.tab{padding:8px 18px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;color:#888;font-weight:400}
.tab.active{color:#1a1a1a;font-weight:500;border-bottom-color:#378ADD}
.panel{display:none}.panel.active{display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-weight:500;color:#666;font-size:12px;padding:7px 8px;border-bottom:0.5px solid #ddd;text-align:left}
td{padding:6px 8px;border-bottom:0.5px solid #eee}
td.center{text-align:center}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.metric{background:#f5f5f3;border-radius:8px;padding:12px 16px}
.metric.best{border:2px solid #378ADD;background:#f0f6fd}
.metric .rank{font-size:11px;color:#888;margin-bottom:3px}
.metric .name{font-size:15px;font-weight:500;margin-bottom:2px}
.metric .score{font-size:22px;font-weight:500}
.metric.best .score{color:#378ADD}
.metric .pct{font-size:12px;color:#888}
.crit-row{display:flex;align-items:center;gap:10px;background:#f5f5f3;padding:9px 12px;border-radius:8px;border:0.5px solid #eee;margin-bottom:8px}
.crit-row input[type=text]{flex:1;background:#fff}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;background:#f0f0ee;border-radius:6px;padding:3px 10px;font-size:12px;border:0.5px solid #ddd}
.chip span.del{cursor:pointer;color:#aaa;font-size:14px}.chip span.del:hover{color:#c00}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.toast{position:fixed;top:16px;right:16px;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:500;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none}
.bar-row{margin-bottom:11px}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px}
.bar-track{background:#eee;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .35s}
.best-badge{font-size:11px;background:#e6f1fb;color:#185fa5;padding:2px 7px;border-radius:4px;margin-left:6px}
.section-label{font-size:13px;font-weight:500;color:#666;margin-bottom:10px}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:1000;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:24px 28px;max-width:340px;width:90%;text-align:center}
.confirm-box p{font-size:14px;color:#333;margin-bottom:20px;line-height:1.5}
.confirm-box .actions{display:flex;gap:10px;justify-content:center}

/* ── Tree UI ── */
.tree-wrap{padding:4px 0}
.tree-node{margin-bottom:8px}
.tree-card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:12px 14px;transition:box-shadow .2s,border-color .2s}
.tree-card.type-decision{border-left:3px solid #378ADD}
.tree-card.type-chance{border-left:3px solid #1D9E75}
.tree-card.type-outcome{border-left:3px solid #888}
/* Best-path highlight */
.tree-card.best{background:#f0faf4;border-color:#9FE1CB;box-shadow:0 0 0 1px #5DCAA5}
.best-badge-inline{font-size:10px;background:#1D9E75;color:#fff;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}
.tree-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tree-label-input{font-size:13px;font-weight:500;border:none;background:transparent;outline:none;color:#1a1a1a;padding:0;min-width:80px;flex:1}
.tree-label-input:focus{background:#f5f5f3;border-radius:4px;padding:1px 4px}
.tree-ev{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
.tree-ev strong{color:#1a1a1a;font-weight:500}
.tree-card-body{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.tree-card-body label{font-size:12px;color:#888;white-space:nowrap}
.tree-num-input{width:90px;border:0.5px solid #ccc;border-radius:6px;padding:5px 8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.tree-num-input:focus{border-color:#378ADD;box-shadow:0 0 0 2px rgba(55,138,221,.15)}
.tree-num-input.error{border-color:#c00;box-shadow:0 0 0 2px rgba(200,0,0,.12)}
.field-error{font-size:11px;color:#c00;margin-top:3px}
.prob-warning{font-size:11px;color:#c00;margin-top:4px}
.tree-children{margin-top:8px;padding-left:24px;border-left:1px solid #eee}
.tree-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tree-root-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:#fff;border:0.5px solid #ddd;border-radius:10px;flex-wrap:wrap}
.tree-root-bar label{font-size:12px;color:#888;white-space:nowrap}
.ev-summary{background:#f0f6fd;border:0.5px solid #b5d4f4;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ev-summary .ev-main{font-size:22px;font-weight:500;color:#185fa5}
.ev-summary .ev-label{font-size:12px;color:#378ADD}

/* Tree toolbar (Phase 5) */
.tree-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* Branch breakdown (Phase 5) */
.branch-list{display:flex;flex-direction:column;gap:6px}
.branch-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f5f5f3;border-radius:6px;font-size:13px;border-left:3px solid transparent}
.branch-row.best{background:#f0faf4;border-left-color:#1D9E75}
.branch-row .branch-name{font-weight:400}
.branch-row.best .branch-name{font-weight:500}
.branch-row .branch-ev{font-variant-numeric:tabular-nums;color:#555}
.branch-row.best .branch-ev{color:#0f6e56;font-weight:500}

/* Best path text (Phase 5) */
.best-path{margin-top:10px;padding:10px 14px;background:#f0faf4;border:0.5px solid #9FE1CB;border-radius:8px;font-size:13px;line-height:1.6}
.best-path-label{font-size:11px;color:#0f6e56;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.best-path-text{color:#1a1a1a}
.best-path-text .arrow{color:#5DCAA5;margin:0 4px}
.best-path-text .final{color:#0f6e56;font-weight:500}

@media(max-width:600px){.topbar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Decision engine</h1>
    <div class="topbar-right" id="matrixControls">
      <input type="text" id="scenarioName" placeholder="Scenario name…" style="width:140px">
      <button onclick="saveScenario()">Save</button>
      <button onclick="exportJSON()">Export JSON</button>
      <button onclick="document.getElementById('fileIn').click()">Import JSON</button>
      <input type="file" id="fileIn" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="danger" onclick="confirmReset()">Reset</button>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" id="modeMatrix" onclick="switchMode('matrix')">Decision Matrix</button>
    <button class="mode-btn" id="modeTree" onclick="switchMode('tree')">Decision Tree</button>
  </div>

  <!-- ── MATRIX VIEW ── -->
  <div id="view-matrix">
    <div id="chipsWrap" class="chips"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('matrix',this)">Matrix</button>
      <button class="tab" onclick="switchTab('results',this)">Results</button>
      <button class="tab" onclick="switchTab('settings',this)">Criteria &amp; weights</button>
    </div>
    <div id="panel-matrix" class="panel active">
      <div style="overflow-x:auto"><table id="matrixTable"></table></div>
      <div class="add-row" style="margin-top:12px">
        <input type="text" id="newOpt" placeholder="New option name…" onkeydown="if(event.key==='Enter')addOption()">
        <button onclick="addOption()">+ Add option</button>
      </div>
    </div>
    <div id="panel-results" class="panel">
      <div id="metricCards" class="metric-grid"></div>
      <div class="card"><div class="section-label">Score comparison</div><div id="barChart"></div></div>
      <div class="card"><div class="section-label">Breakdown by criterion</div><div style="overflow-x:auto"><table id="breakdownTable"></table></div></div>
    </div>
    <div id="panel-settings" class="panel">
      <div class="section-label">Criteria &amp; weights</div>
      <div id="critList"></div>
      <div class="add-row">
        <input type="text" id="newCrit" placeholder="New criterion name…" onkeydown="if(event.key==='Enter')addCriterion()">
        <button onclick="addCriterion()">+ Add criterion</button>
      </div>
    </div>
  </div>

  <!-- ── TREE VIEW ── -->
  <div id="view-tree" style="display:none">

    <div class="tree-toolbar">
      <button onclick="treeExportJSON()">Export tree JSON</button>
      <button onclick="document.getElementById('treeFileIn').click()">Import tree JSON</button>
      <input type="file" id="treeFileIn" accept=".json" style="display:none" onchange="treeImportJSON(event)">
      <button class="danger" onclick="treeReset()">Reset tree</button>
    </div>

    <!-- Summary (EV + best option + best path) -->
    <div id="treeSummary" style="display:none" class="ev-summary">
      <div>
        <div class="ev-label">Expected value</div>
        <div class="ev-main" id="treeEVDisplay">—</div>
      </div>
      <div style="font-size:12px;color:#555;line-height:1.6" id="treeEVNote"></div>
    </div>

    <div class="tree-root-bar">
      <label>Root question:</label>
      <input type="text" id="rootLabel" placeholder="e.g. Should I launch the product?" style="flex:1;min-width:200px">
    </div>

    <div id="treeWrap" class="tree-wrap"></div>

    <!-- Branch breakdown + best path (Phase 5) -->
    <div id="branchBreakdownCard" class="card" style="display:none">
      <div class="section-label">Branch breakdown</div>
      <div id="branchList" class="branch-list"></div>
      <div id="bestPathBox" class="best-path" style="display:none">
        <div class="best-path-label">Best path</div>
        <div class="best-path-text" id="bestPathText"></div>
      </div>
    </div>

  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p>Reset everything to defaults?<br>This will clear all scores, criteria, and saved scenarios.</p>
    <div class="actions">
      <button class="danger" onclick="doReset()">Yes, reset</button>
      <button onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// MATRIX
// ════════════════════════════════════════════════════════════════════════════
const PALETTE=["#378ADD","#1D9E75","#D85A30","#7F77DD","#D4537E","#639922","#BA7515","#E24B4A","#888780"];
const SK="dm_autosave",SS="dm_scenarios";
const DEFAULTS={
  options:["Hotel 1","Hotel 2","Hotel 3","Hotel 4"],
  criteria:[{name:"Ambiance",weight:8},{name:"Price",weight:9},{name:"Location",weight:7},{name:"Hygiene",weight:8}],
  scores:{
    "Hotel 1":{"Ambiance":7,"Price":6,"Location":8,"Hygiene":8},
    "Hotel 2":{"Ambiance":8,"Price":8,"Location":6,"Hygiene":7},
    "Hotel 3":{"Ambiance":6,"Price":9,"Location":7,"Hygiene":6},
    "Hotel 4":{"Ambiance":9,"Price":5,"Location":9,"Hygiene":9}
  }
};
function freshState(){return{options:[...DEFAULTS.options],criteria:DEFAULTS.criteria.map(c=>({...c})),scores:JSON.parse(JSON.stringify(DEFAULTS.scores))};}
let state=freshState(),scenarios={},activeTab="matrix",activeMode="matrix";
function switchMode(mode){
  activeMode=mode;
  document.getElementById('view-matrix').style.display=mode==='matrix'?'block':'none';
  document.getElementById('view-tree').style.display=mode==='tree'?'block':'none';
  document.getElementById('modeMatrix').classList.toggle('active',mode==='matrix');
  document.getElementById('modeTree').classList.toggle('active',mode==='tree');
  document.getElementById('matrixControls').style.display=mode==='matrix'?'flex':'none';
  if(mode==='tree') renderTree();
}
function confirmReset(){document.getElementById('confirmOverlay').classList.add('open');}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');}
function doReset(){try{localStorage.removeItem(SK);localStorage.removeItem(SS);}catch{}scenarios={};state=freshState();closeConfirm();renderChips();render();showToast('Reset to defaults');}
function switchTab(name,btn){activeTab=name;document.querySelectorAll('#view-matrix .panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('#view-matrix .tab').forEach(b=>b.classList.remove('active'));document.getElementById('panel-'+name).classList.add('active');btn.classList.add('active');if(name==='results')renderResults();if(name==='settings')renderSettings();if(name==='matrix')renderMatrix();}
function calcTotals(){const maxP=state.criteria.reduce((s,c)=>s+c.weight*10,0);return state.options.map(opt=>{const total=state.criteria.reduce((s,c)=>s+(state.scores[opt]?.[c.name]||1)*c.weight,0);return{opt,total,pct:maxP>0?Math.round(total/maxP*100):0};}).sort((a,b)=>b.total-a.total);}
function recalc(){autosave();updateTotalsColumn();if(activeTab==='results')renderResults();}
function updateTotalsColumn(){const ranked=calcTotals();document.querySelectorAll('#matrixTable tbody tr').forEach(row=>{const ni=row.querySelector('input[type=text]');if(!ni)return;const found=ranked.find(x=>x.opt===ni.value);if(!found)return;const tc=row.querySelector('td.total-cell');if(tc)tc.innerHTML=`${found.total}<span style="font-size:11px;color:#aaa;margin-left:3px">${found.pct}%</span>`;const isBest=ranked[0].opt===ni.value;row.style.background=isBest?'rgba(55,138,221,.05)':'';ni.style.fontWeight=isBest?500:400;});document.querySelectorAll('#matrixTable thead th.crit-th').forEach((th,i)=>{const hint=th.querySelector('.w-hint');if(hint&&state.criteria[i])hint.textContent=`w:${state.criteria[i].weight}`;});}
function render(){autosave();renderChips();renderMatrix();if(activeTab==='results')renderResults();if(activeTab==='settings')renderSettings();}
function renderChips(){const w=document.getElementById("chipsWrap"),list=Object.keys(scenarios);if(!list.length){w.innerHTML="";return;}w.innerHTML='<span style="font-size:12px;color:#888;align-self:center">Saved:</span>'+list.map(n=>`<span class="chip"><span style="cursor:pointer" data-load="${esc(n)}">${esc(n)}</span><span class="del" data-del="${esc(n)}">×</span></span>`).join("");w.querySelectorAll('[data-load]').forEach(el=>el.addEventListener('click',()=>loadScenario(el.dataset.load)));w.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',()=>delScenario(el.dataset.del)));}
function renderMatrix(){const t=document.getElementById("matrixTable"),ranked=calcTotals();let h=`<thead><tr><th>Option</th>`;state.criteria.forEach((c,ci)=>{h+=`<th class="center crit-th" data-ci="${ci}">${esc(c.name)}<br><span class="w-hint" style="font-weight:400;color:#aaa">w:${c.weight}</span></th>`;});h+=`<th style="text-align:right">Total</th><th></th></tr></thead><tbody>`;state.options.forEach(opt=>{const r=ranked.findIndex(x=>x.opt===opt),{total,pct}=ranked.find(x=>x.opt===opt);h+=`<tr style="background:${r===0?'rgba(55,138,221,.05)':''}">`;h+=`<td><input type="text" value="${esc(opt)}" style="width:110px;font-weight:${r===0?500:400}" data-oldname="${esc(opt)}"></td>`;state.criteria.forEach(c=>{const sc=state.scores[opt]?.[c.name]??5;h+=`<td class="center"><input type="number" min="1" max="10" value="${sc}" data-opt="${esc(opt)}" data-crit="${esc(c.name)}"></td>`;});h+=`<td style="text-align:right;font-weight:500" class="total-cell">${total}<span style="font-size:11px;color:#aaa;margin-left:3px">${pct}%</span></td>`;h+=`<td><button class="icon" data-remove="${esc(opt)}">×</button></td></tr>`;});h+=`</tbody>`;t.innerHTML=h;t.querySelectorAll('input[type=number][data-opt]').forEach(inp=>{inp.addEventListener('input',()=>{const val=Math.min(10,Math.max(1,+inp.value||1));if(!state.scores[inp.dataset.opt])state.scores[inp.dataset.opt]={};state.scores[inp.dataset.opt][inp.dataset.crit]=val;recalc();});});t.querySelectorAll('input[type=text][data-oldname]').forEach(inp=>{const commit=()=>{renameOption(inp.dataset.oldname,inp.value);inp.dataset.oldname=inp.value;};inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});});t.querySelectorAll('button[data-remove]').forEach(btn=>{btn.addEventListener('click',()=>removeOption(btn.dataset.remove));});}
function renderResults(){const ranked=calcTotals();document.getElementById("metricCards").innerHTML=ranked.map(({opt,total,pct},i)=>`<div class="metric${i===0?' best':''}"><div class="rank">#${i+1}${i===0?' (best)':''}</div><div class="name">${esc(opt)}</div><div class="score">${total}</div><div class="pct">${pct}% of max</div></div>`).join("");const maxT=ranked[0]?.total||1;document.getElementById("barChart").innerHTML=ranked.map(({opt,total,pct},i)=>`<div class="bar-row"><div class="bar-label"><span style="font-weight:${i===0?500:400}">${i===0?'🥇 ':''}${esc(opt)}${i===0?'<span class="best-badge">best</span>':''}</span><span style="color:#888">${total} pts · ${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(total/maxT*100)}%;background:${PALETTE[i%PALETTE.length]}"></div></div></div>`).join("");let h=`<thead><tr><th>Criterion</th><th class="center">Weight</th>`;state.options.forEach(o=>h+=`<th class="center">${esc(o)}</th>`);h+=`</tr></thead><tbody>`;state.criteria.forEach(c=>{const vals=state.options.map(o=>(state.scores[o]?.[c.name]??5)*c.weight),best=Math.max(...vals);h+=`<tr><td>${esc(c.name)}</td><td class="center" style="color:#888">${c.weight}</td>`;state.options.forEach(o=>{const sc=state.scores[o]?.[c.name]??5,ws=sc*c.weight;h+=`<td class="center" style="font-weight:${ws===best?500:400};color:${ws===best?'#378ADD':'inherit'}">${ws}<span style="font-size:11px;color:#aaa;margin-left:2px">(${sc}×${c.weight})</span></td>`;});h+=`</tr>`;});document.getElementById("breakdownTable").innerHTML=h+`</tbody>`;}
function renderSettings(){const cl=document.getElementById("critList");cl.innerHTML=state.criteria.map((c,i)=>`<div class="crit-row" data-ci="${i}"><input type="text" value="${esc(c.name)}" data-ci="${i}" data-oldname="${esc(c.name)}" style="flex:1"><span class="w-label" style="font-size:12px;color:#888;min-width:70px">Weight: <b>${c.weight}</b></span><input type="range" min="1" max="10" step="1" value="${c.weight}" data-ci="${i}"><button class="icon" data-remove-ci="${i}">×</button></div>`).join("");cl.querySelectorAll('input[type=range]').forEach(inp=>{inp.addEventListener('input',()=>{const i=+inp.dataset.ci;state.criteria[i].weight=+inp.value;inp.previousElementSibling.innerHTML=`Weight: <b>${inp.value}</b>`;recalc();});});cl.querySelectorAll('input[type=text][data-oldname]').forEach(inp=>{const commit=()=>{renameCrit(+inp.dataset.ci,inp.value);inp.dataset.oldname=inp.value;};inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});});cl.querySelectorAll('button[data-remove-ci]').forEach(btn=>{btn.addEventListener('click',()=>removeCriterion(+btn.dataset.removeCI));});}
function renameCrit(i,newName){if(!newName.trim())return;const old=state.criteria[i].name;if(old===newName)return;state.criteria[i].name=newName;state.options.forEach(o=>{if(state.scores[o]&&old in state.scores[o]){state.scores[o][newName]=state.scores[o][old];delete state.scores[o][old];}});render();}
function removeCriterion(i){const name=state.criteria[i].name;state.criteria.splice(i,1);state.options.forEach(o=>{if(state.scores[o])delete state.scores[o][name];});render();renderSettings();}
function addCriterion(){const inp=document.getElementById('newCrit'),name=inp.value.trim()||`Criterion ${state.criteria.length+1}`;state.criteria.push({name,weight:5});inp.value='';render();if(activeTab==='settings')renderSettings();}
function addOption(){const inp=document.getElementById('newOpt'),name=inp.value.trim()||`Option ${String.fromCharCode(65+state.options.length)}`;state.options.push(name);inp.value='';render();}
function removeOption(opt){state.options=state.options.filter(x=>x!==opt);delete state.scores[opt];render();}
function renameOption(oldName,newName){if(!newName.trim()||newName===oldName)return;state.options=state.options.map(x=>x===oldName?newName:x);state.scores[newName]=state.scores[oldName]||{};delete state.scores[oldName];render();}
function load(d){state={options:[...d.options],criteria:d.criteria.map(c=>({...c})),scores:JSON.parse(JSON.stringify(d.scores))};render();if(activeTab==='settings')renderSettings();}
function saveScenario(){const name=document.getElementById('scenarioName').value.trim()||`Scenario ${Object.keys(scenarios).length+1}`;scenarios[name]={options:[...state.options],criteria:state.criteria.map(c=>({...c})),scores:JSON.parse(JSON.stringify(state.scores))};try{localStorage.setItem(SS,JSON.stringify(scenarios));}catch{}showToast(`Saved "${name}"`);document.getElementById('scenarioName').value='';renderChips();}
function loadScenario(name){if(scenarios[name]){load(scenarios[name]);showToast(`Loaded "${name}"`);}};
function delScenario(name){delete scenarios[name];try{localStorage.setItem(SS,JSON.stringify(scenarios));}catch{}renderChips();}
function exportJSON(){const blob=new Blob([JSON.stringify({options:state.options,criteria:state.criteria,scores:state.scores},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='decision-matrix.json';a.click();}
function importJSON(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{load(JSON.parse(r.result));showToast('Imported successfully');}catch{showToast('Invalid JSON');}};r.readAsText(file);e.target.value='';}
function autosave(){try{localStorage.setItem(SK,JSON.stringify({options:state.options,criteria:state.criteria,scores:state.scores}));}catch{}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2200);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
try{const r=localStorage.getItem(SK);if(r)load(JSON.parse(r));else render();}catch{render();}
try{const s=localStorage.getItem(SS);if(s)scenarios=JSON.parse(s);}catch{}
renderChips();


// ════════════════════════════════════════════════════════════════════════════
// TREE — Phase 5
// ════════════════════════════════════════════════════════════════════════════

let _nextId=1;
function newId(){return 't'+(_nextId++);}
function newNode(type,label){return{id:newId(),label,type,value:null,children:[]};}

function calcEV(nodeId,nodes){
  const node=nodes[nodeId];if(!node)return 0;
  if(node.type==='outcome')return node.value??0;
  if(node.type==='chance')return node.children.reduce((sum,e)=>sum+e.probability*calcEV(e.nodeId,nodes),0);
  if(node.type==='decision'){if(!node.children.length)return 0;return Math.max(...node.children.map(e=>calcEV(e.nodeId,nodes)));}
  return 0;
}

// Given a decision node id, returns the id of the best child (highest EV)
function bestChildId(nodeId,nodes){
  const n=nodes[nodeId];
  if(!n||n.type!=='decision'||!n.children.length)return null;
  let bestId=null,bestEV=-Infinity;
  n.children.forEach(e=>{
    const ev=calcEV(e.nodeId,nodes);
    if(ev>bestEV){bestEV=ev;bestId=e.nodeId;}
  });
  return bestId;
}

// Computes the set of "winning" node ids on the best path through the tree.
// At every decision node along the path, we take the best child.
// At every chance node, we include ALL children (they can all happen).
// At outcomes, we stop.
function computeBestPathSet(rootId,nodes){
  const set=new Set();
  function walk(id){
    const n=nodes[id];if(!n)return;
    set.add(id);
    if(n.type==='outcome')return;
    if(n.type==='decision'){
      const b=bestChildId(id,nodes);
      if(b)walk(b);
    } else if(n.type==='chance'){
      n.children.forEach(e=>walk(e.nodeId));
    }
  }
  walk(rootId);
  return set;
}

// Produces a human-readable path from root → best decision → (chance outcomes)
// Used in the "Best path" summary box.
function describeBestPath(rootId,nodes){
  const root=nodes[rootId];
  if(!root||!root.children.length)return null;
  const best=bestChildId(rootId,nodes);
  if(!best)return null;
  const bestNode=nodes[best];
  const ev=calcEV(best,nodes);
  return {optionLabel:bestNode.label||'(no name)',ev};
}

function freshTreeState(){
  const nodes={};
  const root=newNode('decision','My decision');
  nodes[root.id]=root;
  return{nodes,rootId:root.id};
}
let treeState=freshTreeState();

// ── Tree persistence ─────────────────────────────────────────────────────────
const TK="dm_tree_autosave";
function treeAutosave(){try{localStorage.setItem(TK,JSON.stringify({state:treeState,nextId:_nextId}));}catch{}}
function treeLoadSaved(){
  try{
    const raw=localStorage.getItem(TK);if(!raw)return;
    const d=JSON.parse(raw);
    if(d&&d.state&&d.state.nodes&&d.state.rootId){
      treeState=d.state;
      _nextId=d.nextId||(Object.keys(d.state.nodes).length+1);
    }
  }catch{}
}

function treeReset(){_nextId=1;treeState=freshTreeState();document.getElementById('rootLabel').value='';renderTree();treeAutosave();}

function treeAddChild(parentId){
  const parent=treeState.nodes[parentId];
  let child;
  if(parent.type==='decision'){child=newNode('chance','Option '+(parent.children.length+1));}
  else if(parent.type==='chance'){child=newNode('outcome','Outcome '+(parent.children.length+1));child.value=0;}
  else return;
  treeState.nodes[child.id]=child;
  if(parent.type==='chance'){
    parent.children.push({nodeId:child.id,probability:0});
    const even=parseFloat((1/parent.children.length).toFixed(2));
    parent.children.forEach(e=>e.probability=even);
  } else {
    parent.children.push({nodeId:child.id,probability:null});
  }
  renderTree();
}

function treeRemoveNode(nodeId){
  function collectIds(id){const n=treeState.nodes[id];if(!n)return[];return[id,...n.children.flatMap(e=>collectIds(e.nodeId))];}
  const toRemove=new Set(collectIds(nodeId));
  Object.values(treeState.nodes).forEach(n=>{n.children=n.children.filter(e=>!toRemove.has(e.nodeId));});
  toRemove.forEach(id=>delete treeState.nodes[id]);
  renderTree();
}

function treeChangeType(nodeId,newType){
  const node=treeState.nodes[nodeId];
  if(node.type===newType)return;
  node.type=newType;
  if(newType==='outcome'){node.value=node.value??0;node.children=[];}
  if(newType==='decision')node.value=null;
  if(newType==='chance')node.value=null;
  renderTree();
}

function probSum(node){return node.children.reduce((s,e)=>s+(+e.probability||0),0);}

// ── Tree export / import (Phase 5) ───────────────────────────────────────────
function treeExportJSON(){
  const blob=new Blob([JSON.stringify(treeState,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='decision-tree.json';
  a.click();
  showToast('Tree exported');
}

function treeImportJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d||!d.nodes||!d.rootId)throw new Error('invalid tree');
      treeState=d;
      // bump _nextId to avoid id collisions on next insert
      const maxId=Math.max(0,...Object.keys(d.nodes).map(k=>+k.replace(/\D/g,''))||[0]);
      _nextId=maxId+1;
      renderTree();
      showToast('Tree imported');
    }catch{showToast('Invalid tree JSON');}
  };
  r.readAsText(file);
  e.target.value='';
}

// ── Numeric input helper ─────────────────────────────────────────────────────
function makeNumInput(value,{min=null,max=null,step=null,placeholder='',width='90px',onChange}={}){
  const wrap=document.createElement('div');
  wrap.style.display='inline-flex';wrap.style.flexDirection='column';wrap.style.gap='2px';
  const inp=document.createElement('input');
  inp.type='text';inp.className='tree-num-input';
  inp.value=value!==null&&value!==undefined?String(value):'';
  inp.placeholder=placeholder;inp.style.width=width;
  inp.addEventListener('wheel',e=>e.stopPropagation(),{passive:true});
  const errMsg=document.createElement('div');errMsg.className='field-error';
  function validate(raw){
    const cleaned=raw.replace(',','.');
    if(cleaned.trim()===''){errMsg.textContent='';inp.classList.remove('error');return null;}
    const num=parseFloat(cleaned);
    if(isNaN(num)){inp.classList.add('error');errMsg.textContent='Vul een geldig getal in (bijv. 0.6 of 100)';return null;}
    if(min!==null&&num<min){inp.classList.add('error');errMsg.textContent=`Minimum is ${min}`;return null;}
    if(max!==null&&num>max){inp.classList.add('error');errMsg.textContent=`Maximum is ${max}`;return null;}
    inp.classList.remove('error');errMsg.textContent='';return num;
  }
  inp.addEventListener('blur',()=>{const num=validate(inp.value);if(num!==null){inp.value=String(num);if(onChange)onChange(num);}});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}});
  inp.addEventListener('input',()=>{const cleaned=inp.value.replace(',','.');const num=parseFloat(cleaned);if(inp.value.trim()!==''&&isNaN(num)){inp.classList.add('error');}else{inp.classList.remove('error');errMsg.textContent='';}});
  wrap.appendChild(inp);wrap.appendChild(errMsg);
  return wrap;
}

// ── renderTree ───────────────────────────────────────────────────────────────
function renderTree(){
  treeAutosave();
  const rootLabelInp=document.getElementById('rootLabel');
  const root=treeState.nodes[treeState.rootId];
  if(root&&document.activeElement!==rootLabelInp)rootLabelInp.value=root.label||'';
  rootLabelInp.oninput=()=>{if(root){root.label=rootLabelInp.value;updateEVSummary();}treeAutosave();};

  // Compute best-path set for highlighting
  const bestSet=computeBestPathSet(treeState.rootId,treeState.nodes);

  const wrap=document.getElementById('treeWrap');
  wrap.innerHTML='';
  if(root)wrap.appendChild(buildNodeEl(treeState.rootId,bestSet));
  updateEVSummary();
  renderBranchBreakdown();
}

function updateEVSummary(){
  const root=treeState.nodes[treeState.rootId];
  const hasChildren=root&&root.children.length>0;
  const summary=document.getElementById('treeSummary');
  summary.style.display=hasChildren?'flex':'none';
  if(!hasChildren)return;
  const ev=calcEV(treeState.rootId,treeState.nodes);
  document.getElementById('treeEVDisplay').textContent=ev.toFixed(2);
  if(root.type==='decision'&&root.children.length){
    const best=describeBestPath(treeState.rootId,treeState.nodes);
    if(best){
      document.getElementById('treeEVNote').textContent=`Best option: "${best.optionLabel}" with EV = ${best.ev.toFixed(2)}`;
    } else {
      document.getElementById('treeEVNote').textContent='';
    }
  } else {
    document.getElementById('treeEVNote').textContent='';
  }
}

// ── Branch breakdown + best path (Phase 5) ──────────────────────────────────
function renderBranchBreakdown(){
  const root=treeState.nodes[treeState.rootId];
  const card=document.getElementById('branchBreakdownCard');
  const list=document.getElementById('branchList');
  const pathBox=document.getElementById('bestPathBox');

  if(!root||root.type!=='decision'||root.children.length===0){
    card.style.display='none';return;
  }
  card.style.display='block';

  // Compute EV for each top-level option and sort descending
  const rows=root.children.map(e=>{
    const n=treeState.nodes[e.nodeId];
    return{id:e.nodeId,label:n?.label||'(no name)',ev:calcEV(e.nodeId,treeState.nodes)};
  }).sort((a,b)=>b.ev-a.ev);

  list.innerHTML=rows.map((r,i)=>
    `<div class="branch-row${i===0?' best':''}">
      <span class="branch-name">${i===0?'🥇 ':''}${esc(r.label)}</span>
      <span class="branch-ev">EV = ${r.ev.toFixed(2)}</span>
    </div>`
  ).join('');

  // Best path text (root → best option → expected chance outcomes)
  const bestOptId=bestChildId(treeState.rootId,treeState.nodes);
  if(bestOptId){
    const bestOpt=treeState.nodes[bestOptId];
    let text=`<strong>${esc(root.label||'Root')}</strong><span class="arrow">→</span><strong>${esc(bestOpt.label||'(no name)')}</strong>`;
    // If the best option is a chance node, list its likely outcomes
    if(bestOpt.type==='chance'&&bestOpt.children.length){
      const outcomesText=bestOpt.children.map(e=>{
        const n=treeState.nodes[e.nodeId];
        const pct=Math.round((e.probability||0)*100);
        return `${esc(n?.label||'?')} (${pct}%)`;
      }).join(', ');
      text+=`<span class="arrow">→</span><span class="final">${outcomesText}</span>`;
    } else if(bestOpt.type==='outcome'){
      text+=`<span class="arrow">→</span><span class="final">value ${bestOpt.value??0}</span>`;
    }
    text+=` <span style="color:#888">· EV = ${calcEV(bestOptId,treeState.nodes).toFixed(2)}</span>`;
    document.getElementById('bestPathText').innerHTML=text;
    pathBox.style.display='block';
  } else {
    pathBox.style.display='none';
  }
}

function buildNodeEl(nodeId,bestSet){
  const node=treeState.nodes[nodeId];if(!node)return document.createTextNode('');

  const wrap=document.createElement('div');wrap.className='tree-node';

  const card=document.createElement('div');
  card.className=`tree-card type-${node.type}`;
  // Highlight if on best path (but not the root — root is always "on" the path)
  if(bestSet.has(nodeId)&&nodeId!==treeState.rootId)card.classList.add('best');

  // header
  const header=document.createElement('div');header.className='tree-card-header';

  const labelInp=document.createElement('input');
  labelInp.type='text';labelInp.className='tree-label-input';
  labelInp.value=node.label||'';labelInp.placeholder='Label…';
  labelInp.addEventListener('input',()=>{node.label=labelInp.value;updateEVSummary();renderBranchBreakdown();treeAutosave();});

  const typeSel=document.createElement('select');
  [{v:'decision',t:'Decision'},{v:'chance',t:'Chance'},{v:'outcome',t:'Outcome'}].forEach(({v,t})=>{
    const o=document.createElement('option');o.value=v;o.textContent=t;if(v===node.type)o.selected=true;typeSel.appendChild(o);
  });
  if(nodeId===treeState.rootId)typeSel.disabled=true;
  typeSel.style.cssText='font-size:11px;padding:2px 6px;border-radius:4px;';
  typeSel.addEventListener('change',()=>treeChangeType(nodeId,typeSel.value));

  // "Best" inline badge — only for chance/outcome nodes on the best path
  // (not shown on root decision node)
  if(bestSet.has(nodeId)&&nodeId!==treeState.rootId){
    const badge=document.createElement('span');
    badge.className='best-badge-inline';
    badge.textContent='best';
    header.append(labelInp,typeSel,badge);
  } else {
    header.append(labelInp,typeSel);
  }

  const evSpan=document.createElement('span');evSpan.className='tree-ev';
  if(node.type!=='outcome'){
    const ev=calcEV(nodeId,treeState.nodes);
    evSpan.innerHTML=`EV: <strong>${ev.toFixed(2)}</strong>`;
  }
  header.appendChild(evSpan);
  card.appendChild(header);

  // body (outcome value)
  if(node.type==='outcome'){
    const body=document.createElement('div');body.className='tree-card-body';
    const lbl=document.createElement('label');lbl.textContent='Value:';
    const valWrap=makeNumInput(node.value??0,{
      placeholder:'bijv. 100',width:'100px',
      onChange(num){node.value=num;renderTree();}
    });
    body.append(lbl,valWrap);
    card.appendChild(body);
  }

  // probability input (shown when parent is chance)
  const parent=Object.values(treeState.nodes).find(n=>n.children.some(e=>e.nodeId===nodeId));
  if(parent&&parent.type==='chance'){
    const edge=parent.children.find(e=>e.nodeId===nodeId);
    const probBody=document.createElement('div');probBody.className='tree-card-body';
    const lbl=document.createElement('label');lbl.textContent='Kans (0–1):';
    const probWrap=makeNumInput(edge.probability??0,{
      min:0,max:1,placeholder:'bijv. 0.6',width:'100px',
      onChange(num){edge.probability=num;renderTree();}
    });
    probBody.append(lbl,probWrap);
    card.appendChild(probBody);

    const sum=probSum(parent);
    if(parent.children.length>1&&Math.abs(sum-1)>0.001){
      const warn=document.createElement('div');
      warn.className='prob-warning';
      warn.textContent=`Kansen tellen op tot ${sum.toFixed(2)} — moet 1.00 zijn`;
      card.appendChild(warn);
    }
  }

  // actions
  const actions=document.createElement('div');actions.className='tree-actions';
  if(node.type!=='outcome'){
    const addBtn=document.createElement('button');addBtn.className='small';
    addBtn.textContent=node.type==='decision'?'+ Add option':'+ Add outcome';
    addBtn.addEventListener('click',()=>treeAddChild(nodeId));
    actions.appendChild(addBtn);
  }
  if(nodeId!==treeState.rootId){
    const delBtn=document.createElement('button');delBtn.className='small danger';
    delBtn.textContent='Remove';
    delBtn.addEventListener('click',()=>treeRemoveNode(nodeId));
    actions.appendChild(delBtn);
  }
  if(actions.children.length)card.appendChild(actions);

  wrap.appendChild(card);

  // children
  if(node.children.length){
    const childWrap=document.createElement('div');childWrap.className='tree-children';
    node.children.forEach(edge=>childWrap.appendChild(buildNodeEl(edge.nodeId,bestSet)));
    wrap.appendChild(childWrap);
  }

  return wrap;
}

// ── Init tree (load saved state if any) ─────────────────────────────────────
treeLoadSaved();
</script>
